<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfil • U+</title>

  <link rel="stylesheet" href="../CSS/style.css">
</head>
<body>

  <div class="app">

    <header class="topo">
      <h1>Perfil do aluno</h1>
    </header>

    <main class="conteudo">

      <section class="perfil card">
        <div class="perfil-info">
          <div class="avatar">AR</div>

          <div>
            <h2 id="nome-aluno">Carregando...</h2>
            <p>Sistemas de Informação</p>
          </div>
        </div>

        <div class="perfil-metricas">
          <div class="metrica">
            <span>Participações</span>
            <strong id="pontos-perfil">0</strong>
          </div>

          <div class="metrica">
            <span>Atividades</span>
            <strong id="atividades-perfil">0</strong>
          </div>
        </div>

      </section>

    </main>

    <nav class="rodape">
      <a href="../index.html">🏠</a>
      <a href="../index.html">🔎</a>
      <a href="../index.html">➕</a>
      <a href="../index.html">💬</a>
      <a href="perfil.html">👤</a>
    </nav>

  </div>

  <script src="../Js/perfil.js"></script>
</body>
</html>
